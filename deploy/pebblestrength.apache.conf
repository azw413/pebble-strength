# Apache reverse proxy for pebblestrength.app -> the strength server.
#
# The app runs on the Jetson at 192.168.1.36:8090 (BIND_ADDR=0.0.0.0). This
# Apache host (on a separate machine) terminates TLS and forwards to it.
#
# Enable the required modules first:
#   sudo a2enmod ssl proxy proxy_http headers rewrite
# Get a certificate (the .app TLD is HTTPS-only):
#   sudo certbot --apache -d pebblestrength.app
#   (or: certbot certonly ... then point the SSLCertificate* lines below at it)
# Then drop this file in /etc/apache2/sites-available/, enable, reload:
#   sudo a2ensite pebblestrength && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName pebblestrength.app
    # Force HTTPS (certbot may add this automatically).
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName pebblestrength.app

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/pebblestrength.app/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/pebblestrength.app/privkey.pem

    # Forward everything to the app on the Jetson.
    ProxyPreserveHost On
    ProxyPass        / http://192.168.1.36:8090/
    ProxyPassReverse / http://192.168.1.36:8090/
    RequestHeader set X-Forwarded-Proto "https"

    ProxyTimeout 60
</VirtualHost>
