<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Strength{% endblock %}</title>
<style>
  :root { --accent: #d33; --ink: #1a1a1a; --muted: #777; --line: #e2e2e2; --bg: #fafafa; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         color: var(--ink); background: var(--bg); }
  header { display: flex; align-items: center; gap: 1.2rem; padding: 0.8rem 1.2rem;
           background: #fff; border-bottom: 1px solid var(--line); }
  .brand { font-weight: 700; font-size: 1.1rem; color: var(--accent); text-decoration: none; }
  nav { display: flex; gap: 1rem; align-items: center; flex: 1; }
  nav a { color: var(--ink); text-decoration: none; }
  nav a:hover { color: var(--accent); }
  nav form { margin-left: auto; }
  main { max-width: 860px; margin: 1.5rem auto; padding: 0 1.2rem; }
  h1 { font-size: 1.4rem; }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 8px;
          padding: 1rem; margin-bottom: 0.8rem; }
  .badge { display: inline-block; font-size: 0.75rem; padding: 0.1rem 0.5rem;
           border-radius: 99px; background: #eee; color: #444; margin-left: 0.4rem; }
  .badge.accent { background: #fde8e8; color: var(--accent); }
  .muted { color: var(--muted); font-size: 0.9rem; }
  button, .btn { font: inherit; padding: 0.45rem 0.9rem; border-radius: 6px; cursor: pointer;
                 border: 1px solid var(--line); background: #fff; text-decoration: none;
                 color: var(--ink); display: inline-block; }
  button.primary, .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.small { padding: 0.15rem 0.5rem; font-size: 0.85rem; }
  input[type=text], input[type=number], textarea, select {
    font: inherit; padding: 0.4rem 0.5rem; border: 1px solid var(--line); border-radius: 6px;
    background: #fff; }
  input[type=number] { width: 5.5rem; }
  label { font-size: 0.9rem; }
  .row { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; margin: 0.5rem 0; }
  .error { color: var(--accent); margin: 0.5rem 0; }
  pre.hex { background: #1a1a1a; color: #8f8; padding: 0.8rem; border-radius: 6px;
            overflow-x: auto; font-size: 0.85rem; }
  .tokenbox { background: #fffbe6; border: 1px solid #e6d87a; border-radius: 8px;
              padding: 1rem; margin-bottom: 1rem; word-break: break-all; }
  code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 4px; }
  .tablewrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
  table.list { width: 100%; border-collapse: collapse; }
  table.list th, table.list td { padding: 0.5rem 0.7rem; text-align: left; white-space: nowrap; }
  table.list thead th { color: var(--muted); font-size: 0.72rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 1px solid var(--line); }
  table.list td.num, table.list th.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.list tbody tr:nth-child(even) { background: #f6f6f6; }
  table.list tbody tr:hover { background: #fdf0f0; }
  table.list td.action { text-align: right; }
</style>
</head>
<body>
<header>
  <a class="brand" href="/">Strength</a>
  {% block nav %}{% endblock %}
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
